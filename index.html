        
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GDEH Student Portal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 15px 25px;
      display: flex;
      align-items: center;
    }

    .logo {
      width: 70px;
      height: auto;
    }

    /* Main Content */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      width: 340px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 25px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      color: #0b1f4d;
      margin-bottom: 25px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #4d648d;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 4px;
      color: black;
      outline: none;
      transition: border 0.3s ease;
    }

    input:focus {
      border-color: #001a4d;
    }

    .login-btn {
      width: 100%;
      background: #001a4d;
      color: white;
      border: none;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.3s ease;
    }

    .login-btn:hover {
      background: #0b1f4d;
    }

    .links {
      margin-top: 15px;
      text-align: center;
    }

    .links a {
      display: inline-block;
      margin: 8px 10px 0;
      text-decoration: none;
      color: #001a4d;
      font-size: 13px;
      transition: color 0.3s ease;
    }

    .links a:hover {
      color: #0b1f4d;
      text-decoration: underline;
    }

    /* Footer */
    footer {
      background: #001a4d;
      color: white;
      text-align: center;
      padding: 14px 10px;
      margin-top: auto;
    }

    footer .footer-title {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 5px;
    }

    footer .footer-links {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="header">
    <img src="gdeh_logo.png" alt="GDEH Logo" class="logo">
  </header>
  <form id="loginForm">

                    <!-- USERNAME INPUT BOX -->
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Enter your student username"
                            required
                        >
                    </div>

                    <!-- PASSWORD INPUT BOX -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <!-- HIGH CONTRAST SUBMIT INTERFACE -->
                    <div class="btn-container">
                    <button
type="button"
class="btn"
id="loginBtn">
Login
</button>
                    </div>

      <div class="links">
        <a href="student_signup.html">New Student Signup</a>
        <a href="forgot_password.html">Forgot Password</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-title">
      GDEH STUDENT PORTAL
    </div>

    <div class="footer-links">
      All rights reserved Secure Management Systems
    </div>
  </footer>


    <!-- EXTERNAL APPLICATION JAVASCRIPT -->
    <script src="index.js"></script>

</body>
</html>
