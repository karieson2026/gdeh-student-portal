<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDEH Student Portal - Login</title>
    <style>
        /* GLOBAL RESET & VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        :root {
            --bg-dark: #121212;
            --bg-surface: #1a1a1a;
            --bg-card: #242424;
            --accent: #ff8c00; /* Signature Brand Orange */
            --text-main: #ffffff; /* Pure White Content */
            --border-color: #262626;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* PAGE PACKAGING WRAPPER */
        .page-content-wrapper {
            flex: 1 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* ENLARGED HIGH READABILITY LOGIN BOX */
        .login-box {
            width: 100%;
            max-width: 480px;
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 40px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        /* BRANDING CENTERED INSIDE FORM */
        .form-branding {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .gdeh-logo {
            width: 75px;
            height: 75px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .gdeh-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent); /* Vibrant Orange */
            text-transform: uppercase;
        }

        /* INTEGRATED NOTICE BOX (REPLACED GDEH LOGIN) */
        .form-notice-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 25px;
            text-align: center;
        }

        .notice-text {
            font-size: 11.5px;
            color: var(--text-main);
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* FORM FIELD ELEMENT LAYOUTS */
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group label {
            font-size: 10px;
            font-weight: 300;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.6px;
        }

        .input-group input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid #333333;
            border-radius: 6px;
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 13.5px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .input-group input::placeholder {
            color: #555555;
        }

        /* READABLE BOLD SUBMIT SYSTEM */
        .btn-container {
            margin-top: 25px;
            margin-bottom: 20px;
            width: 100%;
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: #000000; /* Dark text over orange for maximum legibility */
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* PORTAL NAVIGATION LINKS */
        .link-btn {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            font-size: 12px;
            font-weight: 400;
            margin-bottom: 12px;
            transition: color 0.15s ease;
        }

        .link-btn:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* PURE BRIGHT WHITE STICKY FOOTER */
        .footer {
            flex-shrink: 0;
            text-align: center;
            color: #ffffff !important; /* Pure Bright White forced */
            padding: 16px;
            font-size: 10px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            letter-spacing: 0.3px;
        }
    </style>
</head>

<body>

    <!-- MAIN PAGE CONTENT WRAPPER -->
    <div class="page-content-wrapper">

        <div class="login-wrapper">

            <!-- EXPANDED HIGH VISIBILITY LOGIN BOX -->
            <div class="login-box">

                <!-- LOGO + BRANDING AT TOP CENTRE -->
                <div class="form-branding">
                    <img src="GDEH_logo.png" alt="GDEH Logo" class="gdeh-logo">
                    <div class="gdeh-title">GDEH Student Portal</div>
                </div>

                <!-- NOTICE MOVED HERE (REPLACED GDEH LOGIN) -->
                <div class="form-notice-box">
                    <div class="notice-text">
                        Welcome to GDEH Student Portal • Admissions Open • Secure Student Management System
                    </div>
                </div>

                <form id="loginForm">

                    <!-- USERNAME INPUT BOX -->
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Enter your student username"
                            required
                        >
                    </div>

                    <!-- PASSWORD INPUT BOX -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <!-- HIGH CONTRAST SUBMIT INTERFACE -->
                    <div class="btn-container">
                    <button
type="button"
class="btn"
id="loginBtn">
Login
</button>
                    </div>

                    <!-- HELPFUL LINKS -->
                    <a href="student_signup.html" class="link-btn">
                        New Student? Create Account
                    </a>

                    <a href="forgot_password.html" class="link-btn">
                        Forgot Password?
                    </a>

                </form>

            </div>

        </div>

    </div>

    <!-- PURE BRIGHT WHITE ANCHORED FOOTER -->
    <footer class="footer">
        © GDEH STUDENT PORTAL | Secure Student Management System
    </footer>

    <!-- EXTERNAL APPLICATION JAVASCRIPT -->
    <script src="index.js"></script>

</body>
</html>
