
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GDEH Student Portal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      width: 60px;
      height: auto;
    }

    /* Main Content */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }

    .title {
      text-align: center;
      color: #0b1f4d;
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #4d648d;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      color: black;
      outline: none;
      font-size: 14px;
      transition: border 0.3s ease;
    }

    input:focus {
      border-color: #001a4d;
    }

    .login-btn {
      width: 100%;
      background: #001a4d;
      color: white;
      border: none;
      padding: 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.3s ease;
    }

    .login-btn:hover {
      background: #0b1f4d;
    }

    .links {
      margin-top: 15px;
      text-align: center;
    }

    .links a {
      display: inline-block;
      margin: 8px 10px 0;
      text-decoration: none;
      color: #001a4d;
      font-size: 13px;
      transition: color 0.3s ease;
    }

    .links a:hover {
      color: #0b1f4d;
      text-decoration: underline;
    }

    /* Footer */
    footer {
      background: #001a4d;
      color: white;
      text-align: center;
      padding: 12px 8px;
      margin-top: auto;
    }

    footer .footer-title {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }

    footer .footer-links {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
    }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      .login-box {
        padding: 16px;
      }
      .title {
        font-size: 20px;
      }
      input, .login-btn {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="header">
    <img src="gdeh_logo.png" alt="GDEH Logo" class="logo">
  </header>

  <!-- Main -->
  <main class="container">
    <form id="loginForm">

      <h1 class="title">GDEH STUDENT PORTAL</h1>

      <form>
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>

        <button type="submit" class="login-btn">LOGIN</button>
      </form>

      <div class="links">
        <a href="student_signup.html">New Student Signup</a>
        <a href="forgot_password.html">Forgot Password</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-title">
      GDEH STUDENT PORTAL
    </div>

    <div class="footer-links">
      All rights reserved Secure Management Systems
    </div>
  </footer>
    <!-- EXTERNAL APPLICATION JAVASCRIPT -->
    <script src="index.js"></script>

</body>
</html>
