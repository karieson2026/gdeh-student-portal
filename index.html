<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDEH Student Portal - Login</title>

    <style>
        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
        }

        :root{
            --white:#ffffff;
            --navy:#0b1f3a;
            --light-border:#d9dfe7;
            --soft-bg:#f7f9fc;
        }

        html,
        body{
            height:100%;
        }

        body{
            background:var(--white);
            display:flex;
            flex-direction:column;
            color:var(--navy);
        }

        /* PAGE WRAPPER */
        .page-content-wrapper{
            flex:1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        /* TITLE OUTSIDE CONTAINER */
        .page-title{
            color:var(--navy);
            font-size:24px;
            font-weight:600;
            letter-spacing:0.8px;
            margin-bottom:22px;
            text-align:center;
        }

        .login-wrapper{
            width:100%;
            display:flex;
            justify-content:center;
        }

        /* LOGIN BOX */
        .login-box{
            width:100%;
            max-width:460px;
            background:var(--white);
            border:1px solid var(--light-border);
            border-radius:12px;
            padding:35px;
            box-shadow:0 4px 18px rgba(0,0,0,0.08);
        }

        /* LOGO */
        .form-branding{
            display:flex;
            justify-content:center;
            margin-bottom:18px;
        }

        .gdeh-logo{
            width:80px;
            height:80px;
            object-fit:contain;
        }

        /* NOTICE BOX */
        .form-notice-box{
            background:var(--soft-bg);
            border:1px solid var(--light-border);
            border-radius:8px;
            padding:14px;
            margin-bottom:24px;
            text-align:center;
        }

        .notice-text{
            color:var(--navy);
            font-size:13px;
            line-height:1.5;
        }

        /* INPUT GROUPS */
        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:7px;
            font-size:13px;
            font-weight:600;
            color:var(--navy);
        }

        .input-group input{
            width:100%;
            padding:13px 14px;
            border:1px solid #cfd6df;
            border-radius:6px;
            background:#ffffff;
            color:var(--navy);
            font-size:14px;
            outline:none;
            transition:0.2s ease;
        }

        .input-group input:focus{
            border-color:var(--navy);
        }

        .input-group input::placeholder{
            color:#8a94a6;
        }

        /* BUTTON */
        .btn-container{
            margin-top:10px;
            margin-bottom:20px;
        }

        .btn{
            width:100%;
            background:var(--navy);
            color:#ffffff;
            border:none;
            border-radius:6px;
            padding:14px;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s ease;
        }

        .btn:hover{
            opacity:0.92;
        }

        /* LINKS */
        .link-btn{
            display:block;
            text-align:center;
            margin-bottom:12px;
            text-decoration:none;
            color:var(--navy);
            font-size:13px;
            font-weight:500;
            transition:0.2s ease;
        }

        .link-btn:hover{
            text-decoration:underline;
        }

        /* FOOTER */
        .footer{
            background:var(--navy);
            color:#ffffff;
            text-align:center;
            padding:18px;
            font-size:12px;
            letter-spacing:0.3px;
        }

        /* MOBILE */
        @media(max-width:500px){

            .page-title{
                font-size:20px;
            }

            .login-box{
                padding:25px;
            }
        }
    </style>
</head>

<body>

    <!-- PAGE CONTENT -->
    <div class="page-content-wrapper">

        <!-- TITLE OUTSIDE CONTAINER -->
        <h1 class="page-title">
            GDEH STUDENT PORTAL
        </h1>

        <div class="login-wrapper">

            <!-- LOGIN BOX -->
            <div class="login-box">

                <!-- LOGO -->
                <div class="form-branding">
                    <img src="GDEH_logo.png" alt="GDEH Logo" class="gdeh-logo">
                </div>

                <!-- NOTICE -->
                <div class="form-notice-box">
                    <div class="notice-text">
                        Welcome to GDEH Student Portal • Admissions Open • Secure Student Management System
                    </div>
                </div>

                <!-- FORM -->
                <form id="loginForm">

                    <!-- USERNAME -->
                    <div class="input-group">
                        <label for="username">Username</label>

                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Enter your student username"
                            required
                        >
                    </div>

                    <!-- PASSWORD -->
                    <div class="input-group">
                        <label for="password">Password</label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <!-- BUTTON -->
                    <div class="btn-container">
                        <button
                            type="button"
                            class="btn"
                            id="loginBtn">
                            Login
                        </button>
                    </div>

                    <!-- LINKS -->
                    <a href="student_signup.html" class="link-btn">
                        New Student? Create Account
                    </a>

                    <a href="forgot_password.html" class="link-btn">
                        Forgot Password?
                    </a>

                </form>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        © GDEH STUDENT PORTAL | Secure Student Management System
    </footer>

    <script src="index.js"></script>

</body>
</html>
