<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GDEH Student Signup Portal</title>

<style>

/* =========================
   GLOBAL RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

:root{
    --navy:#0b1f3a;
    --light-navy:#506680;
    --white:#ffffff;
}

/* =========================
   BODY
========================= */
body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    background:#ffffff;
}

/* =========================
   PAGE WRAPPER
========================= */
.page-content-wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:28px 18px;
}

/* =========================
   CONTAINER
========================= */
.signup-card{
    width:100%;
    max-width:430px;
    background:#ffffff;
    padding:8px;
}

/* =========================
   BRANDING
========================= */
.branding-header{
    text-align:center;
    margin-bottom:22px;
}

.gdeh-logo{
    width:78px;
    height:78px;
    object-fit:contain;
    margin-bottom:8px;
}

.branding-header h1{
    color:var(--navy);
    font-size:13px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    font-family:Georgia, serif;
}

.branding-header p{
    color:var(--light-navy);
    font-size:9px;
    margin-top:4px;
    letter-spacing:.4px;
}

/* =========================
   ALERT BOX
========================= */
.portal-message{
    display:none;
    padding:8px 10px;
    border-radius:4px;
    margin-bottom:12px;
    font-size:10px;
}

.portal-message.error{
    display:block;
    background:#ffecec;
    color:#cc0000;
}

.portal-message.success{
    display:block;
    background:#edfdf3;
    color:#067647;
}

/* =========================
   ROWS
========================= */
.row{
    display:flex;
    gap:10px;
}

.row .input-group{
    flex:1;
}

.row .input-group.shrink{
    flex:0 0 105px;
}

/* =========================
   INPUT GROUP
========================= */
.input-group,
.otp-container{
    margin-bottom:11px;
}

/* =========================
   LABELS
========================= */
label{
    display:block;
    font-size:9px;
    font-weight:600;
    color:var(--light-navy);
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:.5px;
}

.required{
    color:var(--navy);
}

.field-error{
    font-size:8px;
    color:#cc0000;
    margin-top:2px;
    display:none;
}

/* =========================
   INPUTS
========================= */
input[type="text"],
input[type="email"],
input[type="password"],
input[type="tel"],
input[type="file"],
select{
    width:100%;
    padding:8px 9px;
    font-size:10px;
    color:#000000;
    background:#ffffff;
    border:1px solid #cbd5e1;
    border-radius:5px;
    outline:none;
    transition:.2s ease;
}

input[type="file"]{
    padding:6px;
    cursor:pointer;
}

input::placeholder{
    color:#8b8b8b;
    font-size:10px;
}

input:focus,
select:focus{
    border-color:var(--navy);
    box-shadow:0 0 10px rgba(11,31,58,0.15);
}

select{
    appearance:none;
    cursor:pointer;
    background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b1f3a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat:no-repeat;
    background-position:right 10px center;
    background-size:10px;
}

/* =========================
   OTP AREA
========================= */
.otp-send-row{
    display:flex;
    gap:8px;
}

.otp-send-row input{
    flex:1;
}

.otp-send-btn{
    padding:0 12px;
    background:var(--navy);
    color:#ffffff;
    border:none;
    border-radius:5px;
    font-size:9px;
    font-weight:700;
    cursor:pointer;
    text-transform:uppercase;
    transition:.25s ease;
    box-shadow:
        0 0 10px rgba(11,31,58,0.25),
        0 0 20px rgba(11,31,58,0.12);
}

.otp-send-btn:hover{
    box-shadow:
        0 0 16px rgba(11,31,58,0.40),
        0 0 28px rgba(11,31,58,0.20);
}

.otp-code-box{
    max-width:120px;
}

.otp-code-box input{
    text-align:center;
    letter-spacing:2px;
    font-weight:700;
}

.otp-timer-area{
    margin-top:5px;
    display:flex;
    align-items:center;
    gap:5px;
}

.otp-label{
    font-size:9px;
    color:#777;
}

.otp-timer{
    font-size:10px;
    color:var(--navy);
    font-weight:700;
}

.otp-small-text{
    display:block;
    margin-top:3px;
    font-size:8px;
    color:#777;
}

/* =========================
   BUTTON
========================= */
.btn-container{
    display:flex;
    justify-content:center;
    margin-top:18px;
}

.signup-btn{
    min-width:165px;
    padding:10px 22px;
    border:none;
    border-radius:25px;
    background:var(--navy);
    color:#ffffff;
    font-size:10px;
    font-weight:700;
    letter-spacing:.8px;
    text-transform:uppercase;
    cursor:pointer;
    transition:.25s ease;
    box-shadow:
        0 0 12px rgba(11,31,58,0.28),
        0 0 22px rgba(11,31,58,0.14);
}

.signup-btn:hover{
    transform:translateY(-1px);
    box-shadow:
        0 0 18px rgba(11,31,58,0.45),
        0 0 30px rgba(11,31,58,0.22);
}

/* =========================
   FOOTER
========================= */
.portal-footer{
    background:var(--navy);
    text-align:center;
    padding:18px;
}

.portal-footer p{
    color:#ffffff;
    font-size:10px;
    line-height:1.7;
    letter-spacing:.4px;
}

.portal-footer .secure-tag{
    font-size:9px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.8px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:520px){

    .row{
        flex-direction:column;
    }

    .row .input-group.shrink{
        flex:1;
    }

}

</style>

</head>

<body>

<div class="page-content-wrapper">

<div class="signup-card">

<!-- BRANDING -->
<div class="branding-header">

<img
src="gdeh_logo.png"
alt="GDEH Logo"
class="gdeh-logo"
>

<h1>
GDEH STUDENT SIGNUP PORTAL
</h1>

<p>
Secure Student Registration System
</p>

</div>

<!-- ALERT -->
<div
id="portalMessageBox"
class="portal-message">
</div>

<!-- FORM -->
<form
id="signupForm"
method="POST"
enctype="multipart/form-data"
novalidate
>

<!-- FULL NAME -->
<div class="input-group">

<label for="fullname">
Full Name <span class="required">*</span>
</label>

<input
type="text"
id="fullname"
name="full_name"
placeholder="John Doe"
required
>

</div>

<!-- PHONE -->
<div class="input-group">

<label for="phone">
Phone Number <span class="required">*</span>
</label>

<input
type="tel"
id="phone"
name="phone"
placeholder="+254700000000"
required
>

</div>

<!-- COUNTY + ZIP -->
<div class="row">

<div class="input-group">

<label for="county">
County <span class="required">*</span>
</label>

<input
type="text"
id="county"
name="county"
placeholder="Nairobi"
required
>

</div>

<div class="input-group shrink">

<label for="zip">
Zip Code <span class="required">*</span>
</label>

<input
type="text"
id="zip"
name="zip_code"
placeholder="00100"
required
>

</div>

</div>

<!-- ADDRESS -->
<div class="input-group">

<label for="address">
Address <span class="required">*</span>
</label>

<input
type="text"
id="address"
name="address"
placeholder="123 Main Street"
required
>

</div>

<!-- COURSE -->
<div class="input-group">

<label for="course-selection">
Select Course <span class="required">*</span>
</label>

<select
id="course-selection"
name="course"
required
>

<option value="">
Choose your course...
</option>

<option value="Computer Packages">
Computer Packages
</option>

<option value="Smartphone Literacy">
Smartphone Literacy
</option>

<option value="Agro Entrepreneurship">
Agro Entrepreneurship
</option>

<option value="ICT Short Courses">
ICT Short Courses
</option>

</select>

</div>

<!-- PHOTO -->
<div class="input-group">

<label for="profile-photo">
Upload Profile Photo
<span class="required">*</span>
</label>

<input
type="file"
id="profile-photo"
name="profile_photo"
accept="image/*"
required
>

</div>

<!-- USERNAME -->
<div class="input-group">

<label for="username">
Create Username
<span class="required">*</span>
</label>

<input
type="text"
id="username"
name="username"
placeholder="johndoe99"
required
>

</div>

<!-- PASSWORDS -->
<div class="row">

<div class="input-group">

<label for="password">
Create Password
<span class="required">*</span>
</label>

<input
type="password"
id="password"
name="password"
placeholder="••••••••"
required
>

</div>

<div class="input-group">

<label for="confirm-password">
Confirm Password
<span class="required">*</span>
</label>

<input
type="password"
id="confirm-password"
placeholder="••••••••"
required
>

</div>

</div>

<!-- EMAIL OTP -->
<div class="otp-container">

<label for="email">
Gmail Address For OTP
<span class="required">*</span>
</label>

<div class="otp-send-row">

<input
type="email"
id="email"
name="email"
placeholder="example@gmail.com"
required
>

<button
type="button"
id="sendOtpBtn"
class="otp-send-btn"
>
Send OTP
</button>

</div>

<div class="otp-timer-area">

<small class="otp-label">
OTP expires in:
</small>

<span id="otp-timer" class="otp-timer">
05:00
</span>

</div>

</div>

<!-- OTP -->
<div class="input-group otp-code-box">

<label for="otp-code">
Enter 6-Digit OTP
<span class="required">*</span>
</label>

<input
type="text"
id="otp-code"
name="otp"
maxlength="6"
placeholder="000000"
required
>

<small class="otp-small-text">
Enter OTP sent to your Gmail.
</small>

</div>

<!-- BUTTON -->
<div class="btn-container">

<button
type="submit"
id="submitBtn"
class="signup-btn"
>
Create Account
</button>

</div>

</form>

</div>
</div>

<!-- FOOTER -->
<footer class="portal-footer">

<p>
© GDEH STUDENT PORTAL | All Rights Reserved
</p>

<p class="secure-tag">
Secure Management Systems
</p>

</footer>

<script src="student_signup.js"></script>

</body>
</html>
