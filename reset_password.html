<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDEH Reset Password</title>

<style>

/* =========================
   GLOBAL
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* =========================
   CENTER LAYOUT
========================= */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* =========================
   RESET BOX
========================= */
.reset-box{
  width:100%;
  max-width:420px;
  background:#151515;
  border:1px solid #222;
  border-radius:20px;
  padding:24px;
}

.reset-title{
  color:orange;
  font-size:18px;
  text-align:center;
  margin-bottom:18px;
}

/* =========================
   INPUTS
========================= */
.input-group{
  margin-bottom:14px;
}

.input-group label{
  display:block;
  margin-bottom:6px;
  color:#bbb;
  font-size:11px;
}

.input-group input{
  width:100%;
  background:#1b1b1b;
  border:1px solid #222;
  border-radius:12px;
  padding:12px;
  color:white;
  outline:none;
  font-size:11px;
}

/* =========================
   PASSWORD BOX
========================= */
.password-box{
  position:relative;
}

.toggle-password{
  position:absolute;
  right:12px;
  top:14px;
  color:orange;
  cursor:pointer;
  font-size:10px;
}

/* =========================
   BUTTON
========================= */
.btn{
  width:100%;
  background:orange;
  color:black;
  border:none;
  padding:12px;
  border-radius:10px;
  font-size:11px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

.btn:hover{
  opacity:0.9;
}

/* =========================
   FOOTER
========================= */
.footer{
  background:#000;
  border-top:1px solid #222;
  color:orange;
  text-align:center;
  padding:12px;
  font-size:10px;
}

</style>
</head>

<body>

<!-- MAIN -->
<div class="main">

  <div class="reset-box">

    <div class="reset-title">
      Reset Password
    </div>

    <!-- NEW PASSWORD -->
    <div class="input-group">
      <label>New Password</label>

      <div class="password-box">
        <input type="password" id="new_password" placeholder="New password">
        <span class="toggle-password" onclick="togglePassword('new_password')">SHOW</span>
      </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-group">
      <label>Confirm Password</label>

      <div class="password-box">
        <input type="password" id="confirm_password" placeholder="Confirm password">
        <span class="toggle-password" onclick="togglePassword('confirm_password')">SHOW</span>
      </div>
    </div>

    <!-- RESET BUTTON -->
    <button class="btn" id="resetBtn">
      Reset Password
    </button>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  © GDEH STUDENT PORTAL | Secure Student Management System
</footer>

<!-- JS -->
<script src="reset_password.js"></script>

</body>
</html>
